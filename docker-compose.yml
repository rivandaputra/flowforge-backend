version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=3307
      - DB_USERNAME=flowforge
      - DB_PASSWORD=password
      - DB_NAME=flowforge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-secret-key
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - flowforge-network

  # MySQL Database
  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=flowforge
      - MYSQL_USER=flowforge
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - flowforge-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flowforge-network

  # Frontend (if exists - placeholder)
  # frontend:
  #   build:
  #     context: ../flowforge-frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3001:3000"
  #   depends_on:
  #     - api
  #   networks:
  #     - flowforge-network

volumes:
  mysql_data:
  redis_data:

networks:
  flowforge-network:
    driver: bridge